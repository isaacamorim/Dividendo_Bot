# /etc/nginx/sites-available/dividendo-bot
# Reverse proxy do Dividend Bot: http://191.252.217.250/api/ -> uvicorn 127.0.0.1:8003
# Server block DEDICADO — não toca no 'default' nem em nenhum outro projeto do VPS.

server {
    listen 80;
    server_name 191.252.217.250;

    location /api/ {
        proxy_pass http://127.0.0.1:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
