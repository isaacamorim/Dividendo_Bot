name: Deploy — Dividend Bot B3

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 191.252.217.250
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            bash /opt/dividendo-bot/scripts/deploy.sh
          command_timeout: 300s
